name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build and test in Docker
        run: |
          docker build -t fortran-101:test .
          docker run -d --name fortran-101-test -p 8008:8008 fortran-101:test
          chmod +x scripts/test_api.sh scripts/tests/*.sh
          CONTAINER_NAME=fortran-101-test BASE_URL=http://127.0.0.1:8008 ./scripts/test_api.sh
          docker rm -f fortran-101-test
